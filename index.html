<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白背景透過PNG変換</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 24px;
      line-height: 1.5;
    }
    h1 { margin-top: 0; }
    .controls {
      display: grid;
      gap: 12px;
      max-width: 560px;
      margin-bottom: 18px;
    }
    label { font-weight: 600; }
    .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    button { padding: 8px 12px; cursor: pointer; }
    canvas {
      max-width: 100%;
      height: auto;
      border: 1px solid #999;
      background: repeating-conic-gradient(#eee 0% 25%, #ddd 0% 50%) 50% / 16px 16px;
    }
    .preview {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .hint { font-size: 0.92rem; opacity: 0.85; }
  </style>
</head>
<body>
  <h1>画像を2値化して白背景を透過PNG化</h1>
  <p class="hint">外部ツール不要。画像を読み込み、しきい値で白黒2値化し、白を透明にしたPNGを保存できます。</p>

  <div class="controls">
    <div>
      <label for="imageInput">画像ファイル</label><br />
      <input id="imageInput" type="file" accept="image/*" />
    </div>

    <div>
      <label for="threshold">しきい値: <span id="thresholdValue">180</span></label><br />
      <input id="threshold" type="range" min="0" max="255" value="180" />
    </div>

    <div class="row">
      <button id="convertButton" type="button" disabled>変換する</button>
      <a id="downloadLink" download="converted.png" style="display:none;">PNGをダウンロード</a>
    </div>
  </div>

  <div class="preview">
    <div>
      <h2>元画像</h2>
      <canvas id="sourceCanvas"></canvas>
    </div>
    <div>
      <h2>変換後（白透過）</h2>
      <canvas id="resultCanvas"></canvas>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const thresholdInput = document.getElementById('threshold');
    const thresholdValue = document.getElementById('thresholdValue');
    const convertButton = document.getElementById('convertButton');
    const downloadLink = document.getElementById('downloadLink');
    const sourceCanvas = document.getElementById('sourceCanvas');
    const resultCanvas = document.getElementById('resultCanvas');
    const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const resultCtx = resultCanvas.getContext('2d');

    let sourceImageData = null;

    thresholdInput.addEventListener('input', () => {
      thresholdValue.textContent = thresholdInput.value;
    });

    imageInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (!file) {
        sourceImageData = null;
        convertButton.disabled = true;
        return;
      }

      const imageUrl = URL.createObjectURL(file);
      try {
        const image = await loadImage(imageUrl);
        sourceCanvas.width = image.naturalWidth;
        sourceCanvas.height = image.naturalHeight;
        resultCanvas.width = image.naturalWidth;
        resultCanvas.height = image.naturalHeight;

        sourceCtx.clearRect(0, 0, sourceCanvas.width, sourceCanvas.height);
        sourceCtx.drawImage(image, 0, 0);
        sourceImageData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
        convertButton.disabled = false;
        downloadLink.style.display = 'none';
      } finally {
        URL.revokeObjectURL(imageUrl);
      }
    });

    convertButton.addEventListener('click', () => {
      if (!sourceImageData) return;

      const threshold = Number(thresholdInput.value);
      const output = new ImageData(sourceImageData.width, sourceImageData.height);
      const src = sourceImageData.data;
      const dst = output.data;

      for (let i = 0; i < src.length; i += 4) {
        const r = src[i];
        const g = src[i + 1];
        const b = src[i + 2];
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        const isBlack = gray < threshold;

        dst[i] = isBlack ? 0 : 255;
        dst[i + 1] = isBlack ? 0 : 255;
        dst[i + 2] = isBlack ? 0 : 255;
        dst[i + 3] = isBlack ? 255 : 0;
      }

      resultCtx.putImageData(output, 0, 0);

      resultCanvas.toBlob((blob) => {
        if (!blob) return;
        const pngUrl = URL.createObjectURL(blob);
        downloadLink.href = pngUrl;
        downloadLink.style.display = 'inline';
      }, 'image/png');
    });

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('画像の読み込みに失敗しました'));
        img.src = url;
      });
    }
  </script>
</body>
</html>
